<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Sentinel prime</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui; background: #0f1419; color: #e1e8ed; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    h1 { margin-bottom: 30px; }
    .section { background: #1a1f26; border: 1px solid #2f3a47; border-radius: 12px; padding: 30px; margin-bottom: 30px; }
    .section h2 { font-size: 18px; margin-bottom: 15px; }
    .btn { padding: 10px 20px; background: #1d9bf0; color: white; border: none; border-radius: 6px; cursor: pointer; }
    .btn:hover { background: #1a8cd8; }
    .btn.danger { background: #f4245e; }
    .btn.secondary { background: transparent; border: 2px solid #2f3a47; color: #e1e8ed; }
    .btn.secondary:hover { border-color: #1d9bf0; color: #1d9bf0; }
    .api-key-box { background: #0f1419; border: 1px solid #2f3a47; padding: 15px; border-radius: 6px; margin: 10px 0; font-family: monospace; word-break: break-all; }
    .badge { display: inline-block; background: #1d9bf0; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-right: 10px; }
    .badge.pro { background: #1d9bf0; }
    .badge.free { background: #6b7280; }
    .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #2f3a47; }
    .nav-brand { font-size: 20px; font-weight: 700; }
    .nav-links a { margin-left: 24px; color: #1d9bf0; text-decoration: none; }
    .nav-links a:hover { color: #e1e8ed; }
    .progress-bar { background: #2f3a47; border-radius: 4px; height: 8px; margin: 10px 0; }
    .progress-fill { background: #1d9bf0; height: 100%; border-radius: 4px; transition: width 0.3s ease; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .stat-card { background: #0f1419; border: 1px solid #2f3a47; padding: 20px; border-radius: 8px; text-align: center; }
    .stat-number { font-size: 24px; font-weight: 700; color: #1d9bf0; }
    .stat-label { font-size: 14px; color: #b0b9c1; margin-top: 5px; }
    .key-item { background: #0f1419; border: 1px solid #2f3a47; padding: 15px; border-radius: 6px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .key-info { flex: 1; }
    .key-actions { display: flex; gap: 10px; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #1d9bf0; color: white; padding: 15px 20px; border-radius: 8px; display: none; z-index: 1000; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <div class="nav-brand">AI Security Copilot</div>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/pricing">Pricing</a>
        <a href="/dashboard">Dashboard</a>
      </div>
    </div>

    <h1>Dashboard</h1>

    <!-- Plan Information -->
    <div class="section">
      <h2>Plan Information</h2>
      <p>Current Plan: <span class="badge pro" id="currentPlan">PRO</span></p>
      <p>Scans per 15 min: <strong id="scanLimit">1,000</strong></p>
      <p>Billing: <strong id="billing">Monthly ($99)</strong></p>
      <button class="btn secondary" onclick="manageBilling()">Manage Billing</button>
    </div>

    <!-- Usage Statistics -->
    <div class="section">
      <h2>Usage Overview</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number" id="scansThisMonth">342</div>
          <div class="stat-label">Scans This Month</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="scansToday">28</div>
          <div class="stat-label">Scans Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="apiKeysCount">3</div>
          <div class="stat-label">Active API Keys</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="highRiskCount">5</div>
          <div class="stat-label">High Risk Findings</div>
        </div>
      </div>
      
      <p>Monthly Usage: <strong id="usageText">342 / 45,000</strong></p>
      <div class="progress-bar">
        <div class="progress-fill" id="usageProgress" style="width: 0.76%;"></div>
      </div>
    </div>

    <!-- API Keys -->
    <div class="section">
      <h2>API Keys</h2>
      <button class="btn" onclick="generateKey()">Generate New API Key</button>
      <div id="keys-list" style="margin-top: 15px;"></div>
    </div>

    <!-- Recent Scans -->
    <div class="section">
      <h2>Recent Scans</h2>
      <div id="recent-scans"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Toast notification
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.display = 'block';
      setTimeout(() => {
        toast.style.display = 'none';
      }, 3000);
    }

    // Generate new API key
    async function generateKey() {
      try {
        const res = await fetch('/api/apikeys', { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify({ userId: 'pro_user' }) 
        });
        const data = await res.json();
        
        if (data.error) {
          showToast('Error: ' + data.error);
          return;
        }
        
        const { apiKey } = data;
        
        const keyHtml = `
          <div class="key-item">
            <div class="key-info">
              <strong>New API Key (save this securely!)</strong>
              <div class="api-key-box">${apiKey}</div>
              <small style="color: #b0b9c1;">Created just now</small>
            </div>
            <div class="key-actions">
              <button class="btn" onclick="copyKey('${apiKey}')">Copy</button>
              <button class="btn danger" onclick="revokeKey('${apiKey}')">Revoke</button>
            </div>
          </div>`;
        
        document.getElementById('keys-list').insertAdjacentHTML('afterbegin', keyHtml);
        showToast('API key generated successfully!');
        updateApiKeyCount();
      } catch (error) {
        showToast('Error: ' + error.message);
      }
    }

    // Copy API key to clipboard
    async function copyKey(key) {
      try {
        await navigator.clipboard.writeText(key);
        showToast('API key copied to clipboard!');
      } catch (error) {
        showToast('Failed to copy key');
      }
    }

    // Revoke API key
    async function revokeKey(key) {
      if (confirm('Are you sure you want to revoke this API key? This action cannot be undone.')) {
        try {
          const res = await fetch('/api/apikeys', { 
            method: 'DELETE', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ apiKey: key }) 
          });
          
          if (res.ok) {
            showToast('API key revoked successfully');
            loadApiKeys();
            updateApiKeyCount();
          } else {
            const data = await res.json();
            showToast('Error: ' + data.error);
          }
        } catch (error) {
          showToast('Error: ' + error.message);
        }
      }
    }

    // Load existing API keys
    async function loadApiKeys() {
      try {
        const res = await fetch('/api/apikeys');
        const data = await res.json();
        
        const keysList = document.getElementById('keys-list');
        keysList.innerHTML = '';
        
        if (data.keys && data.keys.length > 0) {
          data.keys.forEach(key => {
            const keyHtml = `
              <div class="key-item">
                <div class="key-info">
                  <strong>API Key</strong>
                  <div class="api-key-box">${key.key}</div>
                  <small style="color: #b0b9c1;">Created: ${new Date(key.created_at).toLocaleDateString()}</small>
                </div>
                <div class="key-actions">
                  <button class="btn" onclick="copyKey('${key.key}')">Copy</button>
                  <button class="btn danger" onclick="revokeKey('${key.key}')">Revoke</button>
                </div>
              </div>`;
            keysList.insertAdjacentHTML('beforeend', keyHtml);
          });
        } else {
          keysList.innerHTML = '<p style="color: #b0b9c1; margin-top: 15px;">No API keys yet. Generate your first key to get started.</p>';
        }
      } catch (error) {
        console.error('Error loading keys:', error);
      }
    }

    // Load dashboard data
    async function loadDashboardData() {
      try {
        const res = await fetch('/api/dashboard');
        const data = await res.json();
        
        if (data.plan) {
          document.getElementById('currentPlan').textContent = data.plan.toUpperCase();
          document.getElementById('currentPlan').className = `badge ${data.plan.toLowerCase()}`;
        }
        
        if (data.usage) {
          document.getElementById('scansThisMonth').textContent = data.usage.scansThisMonth || 0;
          document.getElementById('scansToday').textContent = data.usage.scansToday || 0;
          
          const total = data.usage.monthlyLimit || 45000;
          const used = data.usage.scansThisMonth || 0;
          const percentage = total > 0 ? (used / total * 100).toFixed(1) : 0;
          
          document.getElementById('usageText').textContent = `${used.toLocaleString()} / ${total.toLocaleString()}`;
          document.getElementById('usageProgress').style.width = `${percentage}%`;
        }
        
        if (data.stats) {
          document.getElementById('highRiskCount').textContent = data.stats.highRiskFindings || 0;
        }
        
        updateApiKeyCount();
      } catch (error) {
        console.error('Error loading dashboard data:', error);
      }
    }

    // Update API key count
    function updateApiKeyCount() {
      const keyItems = document.querySelectorAll('.key-item').length;
      document.getElementById('apiKeysCount').textContent = keyItems;
    }

    // Manage billing (placeholder)
    function manageBilling() {
      showToast('Billing portal coming soon. Contact support for billing changes.');
    }

    // Load recent scans
    async function loadRecentScans() {
      try {
        const res = await fetch('/api/scans');
        const data = await res.json();
        
        const scansContainer = document.getElementById('recent-scans');
        
        if (data.scans && data.scans.length > 0) {
          const recentScans = data.scans.slice(0, 5);
          let html = '';
          
          recentScans.forEach(scan => {
            const riskClass = scan.result_score >= 75 ? 'risk-high' : 
                             scan.result_score >= 40 ? 'risk-med' : 'risk-low';
            const riskLabel = scan.result_score >= 75 ? 'HIGH' : 
                             scan.result_score >= 40 ? 'MEDIUM' : 'LOW';
            
            html += `
              <div style="background: #0f1419; border: 1px solid #2f3a47; padding: 15px; border-radius: 6px; margin-bottom: 10px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <div>
                    <strong>Scan #${scan.id?.slice(0, 8) || 'Unknown'}</strong>
                    <div style="color: #b0b9c1; font-size: 12px; margin-top: 5px;">
                      ${new Date(scan.created_at).toLocaleString()}
                    </div>
                  </div>
                  <div style="text-align: right;">
                    <span class="badge ${riskClass}" style="background: ${
                      riskClass === 'risk-high' ? '#f4245e' : 
                      riskClass === 'risk-med' ? '#f59e0b' : '#10b981'
                    }">${riskLabel} RISK</span>
                    <div style="color: #b0b9c1; font-size: 12px; margin-top: 5px;">
                      Score: ${scan.result_score || 0}/100
                    </div>
                  </div>
                </div>
              </div>`;
          });
          
          scansContainer.innerHTML = html;
        } else {
          scansContainer.innerHTML = '<p style="color: #b0b9c1;">No scans yet. Start scanning to see your results here.</p>';
        }
      } catch (error) {
        console.error('Error loading recent scans:', error);
        document.getElementById('recent-scans').innerHTML = '<p style="color: #b0b9c1;">Unable to load recent scans.</p>';
      }
    }

    // Initialize dashboard
    document.addEventListener('DOMContentLoaded', () => {
      loadDashboardData();
      loadApiKeys();
      loadRecentScans();
    });
  </script>
</body>
</html>
