name: 'AI Security Copilot'
description: 'Scan code and prompts for LLM security vulnerabilities (OWASP LLM Top 10)'
author: 'AI Security Copilot'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  api-key:
    description: 'API key for AI Security Copilot (get from https://ai-agent-security-copilot.vercel.app)'
    required: true
  scan-path:
    description: 'Path to scan (defaults to repository root)'
    required: false
    default: '.'
  fail-on-high:
    description: 'Fail the build if HIGH severity vulnerabilities are found'
    required: false
    default: 'true'
  fail-on-critical:
    description: 'Fail the build if CRITICAL severity vulnerabilities are found'
    required: false
    default: 'true'
  include-patterns:
    description: 'File patterns to include (comma-separated, e.g., "*.js,*.ts,*.prompt")'
    required: false
    default: '*.js,*.ts,*.jsx,*.tsx,*.py,*.prompt,*.txt,*.md,*.json,*.yaml,*.yml'
  exclude-patterns:
    description: 'File patterns to exclude (comma-separated)'
    required: false
    default: 'node_modules/**,dist/**,build/**,.git/**,*.lock,package-lock.json,yarn.lock'
  max-file-size:
    description: 'Maximum file size in KB to scan'
    required: false
    default: '500'
  pr-comment:
    description: 'Post findings as PR comment (requires GITHUB_TOKEN)'
    required: false
    default: 'true'
  github-token:
    description: 'GitHub token for PR comments (usually secrets.GITHUB_TOKEN)'
    required: false
    default: ${{ github.token }}

outputs:
  summary:
    description: 'JSON summary of scan results'
  high-count:
    description: 'Number of HIGH severity findings'
  critical-count:
    description: 'Number of CRITICAL severity findings'
  total-findings:
    description: 'Total number of findings'
  has-failures:
    description: 'Whether the scan failed (true/false)'

runs:
  using: 'node20'
  main: 'github-action/dist/index.js'
